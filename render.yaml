services:
  - type: web
    name: daytona-proxy
    runtime: docker
    dockerfilePath: ./go/Dockerfile
    dockerContext: ./go
    plan: starter
    healthCheckPath: /health
    domains:
      - brainbaselabs.space
      - "*.brainbaselabs.space"
    envVars:
      - key: MAS_BASE_URL
        sync: false
      - key: PREVIEW_RESOLVE_SECRET
        sync: false
      - key: PREVIEW_BASE_DOMAIN
        value: brainbaselabs.space
